<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>merch</title>
    <style>
        body {
            background: #008080; 
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
        }

        #vessel-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
        }

        #vessel-sprite {
            width: 500px; 
            height: auto;
            image-rendering: pixelated; 
        }

        /* SLIDE BUTTON WITH FADE-IN */
        #slide-trigger {
            position: absolute;
            right: 12%; 
            bottom: 25%;
            width: 250px;
            cursor: pointer;
            z-index: 50;
            opacity: 0; /* Starts invisible */
            transition: opacity 3s ease-in, transform 0.2s, filter 0.2s; /* 3 second fade */
            pointer-events: none; /* Can't click while invisible */
        }

        #slide-trigger.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #slide-trigger:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        #box-row {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 100;
        }

        .window {
            width: 280px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            display: none; 
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 11px;
        }

        .window-body {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            word-spacing: 12px;
            color: black;
            text-transform: uppercase;
        }

        .btn-row {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        button {
            padding: 5px 20px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            cursor: pointer;
            font-weight: bold;
        }

        /* FPV SCREEN */
        #slide-fpv-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
        }

        #fpv-image {
            position: absolute;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: auto; height: 100%;
        }

        #slide-question-box {
            position: absolute;
            left: 10%; top: 45%;
            z-index: 1100;
        }
    </style>
</head>
<body>

    <audio id="vessel-audio"></audio>

    <div id="main-ui">
        <div id="vessel-container">
            <img src="idle.gif" id="vessel-sprite">
        </div>

        <!-- The Fading Slide Button -->
        <img src="slide.png" id="slide-trigger" onclick="enterSlidePOV()">

        <div id="box-row">
            <div id="box-1" class="window"><div class="title-bar">MSG_01</div><div class="window-body">WHO ARE YOU?<div class="btn-row"><button onclick="playScene('whoareyou')">ASK</button></div></div></div>
            <div id="box-2" class="window"><div class="title-bar">MSG_02</div><div class="window-body">WHERE ARE WE?<div class="btn-row"><button onclick="playScene('wherearewe')">ASK</button></div></div></div>
            <div id="box-3" class="window"><div class="title-bar">MSG_03</div><div class="window-body">HOW DID I GET HERE?<div class="btn-row"><button onclick="playScene('howdidwegethere')">ASK</button></div></div></div>
            <div id="box-4" class="window"><div class="title-bar">MSG_04</div><div class="window-body">FUCK YOU.<div class="btn-row"><button onclick="playScene('fuckyou')">SAY IT</button></div></div></div>
        </div>
    </div>

    <div id="slide-fpv-screen">
        <img src="slidefpx.png" id="fpv-image"> 
        <div id="slide-question-box" class="window">
            <div class="title-bar">S Y S T E M</div>
            <div class="window-body">
                READY &nbsp; TO &nbsp; SLIDE?
                <div class="btn-row">
                    <button onclick="startSliding()">S L I D E</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel-sprite');
        const audio = document.getElementById('vessel-audio');
        const slideBtn = document.getElementById('slide-trigger');

        function playScene(sceneName) {
            let gif = "talking.gif";
            let mp3 = "";
            switch(sceneName) {
                case 'happyplace': mp3 = "happyplacestart.mp3"; break;
                case 'whoareyou': mp3 = "whoareyou.mp3"; break;
                case 'wherearewe': mp3 = "wherearewe.mp3"; break;
                case 'howdidwegethere': mp3 = "howdidwegethere.mp3"; break;
                case 'fuckyou': mp3 = "fuckyou.mp3"; gif = "idle.gif"; break;
            }
            sprite.src = gif + "?t=" + new Date().getTime();
            audio.src = mp3;
            audio.play();
            audio.onended = () => { sprite.src = "idle.gif"; };
        }

        window.onload = () => {
            setTimeout(() => {
                playScene('happyplace');
                audio.onended = () => {
                    sprite.src = "idle.gif";
                    // Pop up boxes
                    ['box-1', 'box-2', 'box-3', 'box-4'].forEach((id, i) => {
                        setTimeout(() => document.getElementById(id).style.display = 'block', i * 200);
                    });
                    // Fade in the Slide Button over 3 seconds
                    slideBtn.classList.add('visible');
                };
            }, 1000);
        };

        function enterSlidePOV() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('slide-fpv-screen').style.display = 'block';
        }

        function startSliding() {
            document.getElementById('slide-question-box').style.display = 'none';
            document.getElementById('fpv-image').src = "slidedown.gif?t=" + new Date().getTime();
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 4500);
        }
    </script>
</body>
</html>
