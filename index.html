<!DOCTYPE html>
<html>
<head>
    <title>happy place :)</title>
    <style>
        body { background: #008080; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: "Tahoma", sans-serif; overflow: hidden; }
        #drawer { position: fixed; left: -250px; top: 50%; transform: translateY(-50%); width: 240px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; transition: 0.5s; z-index: 10; }
        #drawer.open { left: 10px; }
        .tab { position: absolute; right: -30px; top: 0; background: #c0c0c0; width: 30px; height: 60px; cursor: pointer; border: 2px solid; border-color: #fff #808080 #808080 #fff; display: flex; align-items: center; justify-content: center; }
        
        .q-item { background: #fff; padding: 5px; margin: 5px; cursor: pointer; font-size: 12px; border: 1px solid #808080; }
        .q-item:hover { background: #000080; color: white; }

        #vessel { width: 400px; }
        #fpv { position: fixed; inset: 0; background: black; display: none; z-index: 100; }
        .win { background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 20px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    </style>
</head>
<body>

    <div id="drawer">
        <div class="tab" onclick="this.parentElement.classList.toggle('open')">></div>
        <div style="background:#000080; color:white; padding:2px;">LOG_ENTRIES.EXE</div>
        <div class="q-item" onclick="talk('whoareyou')">Who are you?</div>
        <div class="q-item" onclick="talk('vessel')">What is the Vessel?</div>
        <div class="q-item" onclick="talk('fuckyou')">Fuck you.</div>
    </div>

    <img src="idle.gif" id="vessel">
    <img src="slide.png" style="width:150px; cursor:pointer;" onclick="showSlide()">

    <div id="fpv">
        <img src="slidefpx.png" style="height:100%; margin: auto; display: block;">
        <div class="win">
            <p>READY TO SLIDE?</p>
            <button onclick="doSlide()">S L I D E</button>
            <button onclick="window.location.href='https://youtu.be/xkYLCFB8hBQ'">N O</button>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel');
        function talk(key) {
            let msg = { whoareyou: "I am Devour. The puppeteer.", vessel: "The original.", fuckyou: "You will regret that." }[key];
            let u = new SpeechSynthesisUtterance(msg);
            u.onstart = () => sprite.src = "talking.gif";
            u.onend = () => { 
                sprite.src = "idle.gif"; 
                if(key === 'fuckyou') window.location.href = "https://freegorillatagdownload.com";
            };
            window.speechSynthesis.speak(u);
        }
        function showSlide() { document.getElementById('fpv').style.display = 'block'; }
        function doSlide() {
            // logic for slidedown.gif and final redirect
            window.location.href = "https://terus.freegorillatagdownload.com";
        }
    </script>
</body>
</html>
