<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>happy place?</title>
    <style>
        body {
            background: #008080; /* Classic teal background */
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Tahoma", sans-serif; /* Windows 98 vibes */
        }

        #stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* RESIZED SPRITE: Now way bigger */
        #vessel-sprite {
            width: 800px; /* Increased from ~400px to 800px */
            height: auto;
            image-rendering: pixelated; /* Keeps it sharp when scaled */
            position: relative;
            z-index: 10;
        }

        #slide-trigger {
            margin-top: 20px;
            width: 180px; /* Size of the slide icon */
            cursor: pointer;
            opacity: 0;
            transition: opacity 3s ease-in;
            pointer-events: none; /* Can't click until visible */
            z-index: 20;
        }

        #slide-trigger.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- THE SLIDE FPV SEQUENCE --- */
        #slide-fpv-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 5000; /* Stays above everything */
        }

        #fpv-image {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%; /* Fills screen vertically */
        }

        /* Standard Windows 98 Style Windows */
        .window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 10px;
        }
        
        #final-fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            z-index: 9999; /* Highest possible */
            pointer-events: none;
            transition: opacity 1.3s ease-in;
        }
    </style>
</head>
<body>

    <!-- Final black overlay before redirect -->
    <div id="final-fade"></div>

    <!-- MAIN STAGE -->
    <div id="stage">
        <!-- Large Devoure Sprite -->
        <img src="idle.gif" id="vessel-sprite">
        
        <!-- Slide Trigger: will appear after talking ends -->
        <img src="slide.png" id="slide-trigger" onclick="enterSlidePOV()" title="GO DOWN?">
    </div>

    <!-- SLIDE FPV SEQUENCE SCREEN -->
    <div id="slide-fpv-screen">
        <!-- First static shot of the slide top -->
        <img src="slidefpx.png" id="fpv-image"> 

        <!-- Pre-Slide Question Box -->
        <div id="slide-question-box" class="window" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); min-width: 250px;">
            <div class="title-bar">S Y S T E M</div>
            <div style="padding:20px; text-align:center; font-size: 12px; font-weight: bold;">
                READY &nbsp; TO &nbsp; SLIDE?
                <br><br>
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button onclick="startSliding()" style="padding:5px 20px; font-weight:bold; cursor: pointer;">S L I D E</button>
                    <button onclick="window.location.href='https://youtu.be/AmtoRAPkO20'" style="padding:5px 20px; font-weight:bold; cursor: pointer;">N O</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel-sprite');
        const slideBtn = document.getElementById('slide-trigger');

        // REVERTED: Old-style popup questioning using alert/confirm
        function oldTalkLoop() {
            // First greeting
            alert("WELCOME TO YOUR HAPPY PLACE.");
            sprite.src = "talking.gif?t=" + Date.now(); // Start talking anim

            setTimeout(() => {
                sprite.src = "idle.gif"; // Stop talking
                alert("I HAVE BEEN WAITING FOR YOU.");
                
                // Second round of questions (Reverted list)
                setTimeout(() => {
                    sprite.src = "talking.gif?t=" + Date.now();
                    
                    // Standard prompt questions
                    alert("WHO AM I? I AM DEVOUR. THE ORIGINAL.");
                    alert("WHERE ARE WE? THE VESSEL. THE ONLY SAFE PLACE LEFT.");

                    sprite.src = "idle.gif";
                    
                    // Final prompt and reveal slide
                    alert("DO YOU WANT TO SEE MY SLIDE? IT IS THE ONLY WAY OUT.");
                    
                    // Make slide visible (RETAINED from newer code)
                    slideBtn.classList.add('visible');
                    
                }, 1500);

            }, 1500);
        }

        // Logic retained from newer code to handle the slide sequence transitions
        function enterSlidePOV() {
            // Hide the stage and Devoure
            document.getElementById('stage').style.display = 'none';
            // Show the FPV screen
            document.getElementById('slide-fpv-screen').style.display = 'block';
        }

        function startSliding() {
            // Hide the choice box
            document.getElementById('slide-question-box').style.display = 'none';
            
            // Switch image to the "sliding down" GIF
            document.getElementById('fpv-image').src = "slidedown.gif?t=" + Date.now();
            
            // Trigger the slow fade to black
            document.getElementById('final-fade').style.opacity = "1";
            
            // Redirect after 1.3 seconds (matching the fade)
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 1300);
        }

        // Auto-start on load
        window.onload = oldTalkLoop;

    </script>
</body>
</html>
