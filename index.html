<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vessel - Interactive</title>
    <style>
        body {
            background: #008080; /* Classic Retro Teal */
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
        }

        /* GIF CONTAINER - Covers the whole screen but keeps sprite size */
        #vessel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none; /* Allows you to click boxes through the character */
        }

        #vessel-sprite {
            /* Adjust size here if he needs to be bigger or smaller */
            width: 500px; 
            height: auto;
            image-rendering: pixelated; 
        }

        /* Windows 95 Styled Boxes */
        .window {
            position: absolute;
            width: 350px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            display: none; 
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
            z-index: 100;
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 12px;
        }

        .window-body {
            padding: 25px;
            text-align: center;
            font-size: 16px;
            color: black;
            font-weight: bold;
            
            /* CREEPY SPACING LOGIC */
            word-spacing: 12px;  /* Huge gaps between words */
            letter-spacing: 2px; /* Gaps between letters */
            text-transform: uppercase;
        }

        .btn-row {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            word-spacing: normal; /* Buttons keep normal spacing */
            letter-spacing: normal;
        }

        button {
            padding: 5px 25px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            cursor: pointer;
            font-family: "Tahoma", sans-serif;
            font-weight: bold;
        }

        button:active {
            border-color: #808080 #fff #fff #808080;
        }
    </style>
</head>
<body>

    <audio id="vessel-audio"></audio>

    <div id="vessel-container">
        <img src="idle.gif" id="vessel-sprite">
    </div>

    <!-- BOX 1 -->
    <div id="box-1" class="window" style="top: 20%; left: 10%;">
        <div class="title-bar">M E S S A G E</div>
        <div class="window-body">
            D O &nbsp; Y O U &nbsp; R E C O G N I Z E &nbsp; M E ?
            <div class="btn-row">
                <button onclick="answer(1, true)">Y E S</button>
                <button onclick="answer(1, false)">N O</button>
            </div>
        </div>
    </div>

    <!-- BOX 2 (Hidden until Box 1 is answered) -->
    <div id="box-2" class="window" style="bottom: 20%; right: 10%;">
        <div class="title-bar">M E S S A G E</div>
        <div class="window-body">
            W H Y &nbsp; A R E &nbsp; Y O U &nbsp; S T I L L &nbsp; H E R E ?
            <div class="btn-row">
                <button onclick="answer(2, true)">I &nbsp; D O N T &nbsp; K N O W</button>
            </div>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel-sprite');
        const audio = document.getElementById('vessel-audio');

        function playScene(sceneName) {
            let gif = "talking.gif";
            let mp3 = "";

            switch(sceneName) {
                case 'whoareyou': mp3 = "whoareyou.mp3"; break;
                case 'wherearewe': mp3 = "wherearewe.mp3"; break;
                case 'howdidwegethere': mp3 = "howdidwegethere.mp3"; break;
                case 'happyplace': mp3 = "happyplacestart.mp3"; break;
                case 'fuckyou': 
                    mp3 = "fuckyou.mp3"; 
                    gif = "idle.gif"; // Stare state
                    break;
            }

            sprite.src = gif + "?t=" + new Date().getTime();
            audio.src = mp3;
            audio.play();

            audio.onended = () => {
                sprite.src = "idle.gif?t=" + new Date().getTime();
            };
        }

        window.onload = () => {
            setTimeout(() => {
                playScene('wherearewe');
                audio.onended = () => {
                    sprite.src = "idle.gif";
                    document.getElementById('box-1').style.display = 'block';
                };
            }, 2000);
        };

        function answer(boxNum, isYes) {
            document.getElementById('box-' + boxNum).style.display = 'none';
            
            if (boxNum === 1) {
                if (isYes) {
                    playScene('happyplace');
                } else {
                    playScene('fuckyou');
                }
                // Show next box after a delay
                setTimeout(() => {
                    document.getElementById('box-2').style.display = 'block';
                }, 2000);
            }
        }
    </script>
</body>
</html>
