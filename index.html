<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Vessel - Interactive</title>
    <style>
        body {
            background: #008080; 
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
        }

        #vessel-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
        }

        #vessel-sprite {
            width: 500px; 
            height: auto;
            image-rendering: pixelated; 
        }

        #box-row {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
        }

        .window {
            width: 280px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px;
            display: none; 
            box-shadow: 3px 3px 0px rgba(0,0,0,1);
        }

        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            font-weight: bold;
            font-size: 11px;
        }

        .window-body {
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: black;
            font-weight: bold;
            word-spacing: 12px;
            line-height: 1.4;
            text-transform: uppercase;
        }

        .btn-row {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            word-spacing: normal; 
        }

        button {
            padding: 4px 12px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            cursor: pointer;
            font-family: "Tahoma", sans-serif;
            font-weight: bold;
        }

        button:active {
            border-color: #808080 #fff #fff #808080;
        }
    </style>
</head>
<body>

    <audio id="vessel-audio"></audio>

    <div id="vessel-container">
        <img src="idle.gif" id="vessel-sprite">
    </div>

    <div id="box-row">
        <!-- BOX 1: WHO ARE YOU -->
        <div id="box-1" class="window">
            <div class="title-bar">MESSAGE_01</div>
            <div class="window-body">
                WHO ARE YOU?
                <div class="btn-row">
                    <button onclick="playScene('whoareyou')">ASK</button>
                </div>
            </div>
        </div>

        <!-- BOX 2: WHERE ARE WE -->
        <div id="box-2" class="window">
            <div class="title-bar">MESSAGE_02</div>
            <div class="window-body">
                WHERE ARE WE?
                <div class="btn-row">
                    <button onclick="playScene('wherearewe')">ASK</button>
                </div>
            </div>
        </div>

        <!-- BOX 3: HOW DID I GET HERE -->
        <div id="box-3" class="window">
            <div class="title-bar">MESSAGE_03</div>
            <div class="window-body">
                HOW DID I GET HERE?
                <div class="btn-row">
                    <button onclick="playScene('howdidwegethere')">ASK</button>
                </div>
            </div>
        </div>

        <!-- BOX 4: FUCK YOU -->
        <div id="box-4" class="window">
            <div class="title-bar">MESSAGE_04</div>
            <div class="window-body">
                FUCK YOU.
                <div class="btn-row">
                    <button onclick="playScene('fuckyou')">SAY IT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel-sprite');
        const audio = document.getElementById('vessel-audio');

        function playScene(sceneName) {
            let gif = "talking.gif";
            let mp3 = "";

            switch(sceneName) {
                case 'happyplace': mp3 = "happyplacestart.mp3"; break;
                case 'whoareyou': mp3 = "whoareyou.mp3"; break;
                case 'wherearewe': mp3 = "wherearewe.mp3"; break;
                case 'howdidwegethere': mp3 = "howdidwegethere.mp3"; break;
                case 'fuckyou': 
                    mp3 = "fuckyou.mp3"; 
                    gif = "idle.gif"; // Stare state
                    break;
            }

            sprite.src = gif + "?t=" + new Date().getTime();
            audio.src = mp3;
            audio.play();

            audio.onended = () => {
                sprite.src = "idle.gif?t=" + new Date().getTime();
            };
        }

        // Logic: Play intro, then show boxes
        window.onload = () => {
            setTimeout(() => {
                playScene('happyplace');
                audio.onended = () => {
                    sprite.src = "idle.gif";
                    showBoxes();
                };
            }, 1000);
        };

        function showBoxes() {
            ['box-1', 'box-2', 'box-3', 'box-4'].forEach((id, i) => {
                setTimeout(() => document.getElementById(id).style.display = 'block', i * 300);
            });
        }
    </script>
</body>
</html>
