<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>happy place :)</title>
    <style>
        body {
            background: #008080; 
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: "Tahoma", sans-serif;
        }

        /* --- THE SLIDING DRAWER --- */
        #question-drawer {
            position: fixed;
            left: -280px; 
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            padding: 2px;
        }

        #question-drawer.open {
            left: 20px;
        }

        #drawer-tab {
            position: absolute;
            right: -40px;
            top: 0;
            width: 40px;
            height: 100px;
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }

        .drawer-content {
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .q-item {
            background: #fff;
            border: 1px inset #808080;
            margin-bottom: 8px;
            padding: 8px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            color: #000;
        }

        .q-item:hover {
            background: #000080;
            color: white;
        }

        #stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        #vessel-sprite {
            width: 450px;
            height: auto;
            image-rendering: pixelated;
        }

        #slide-trigger {
            margin-top: 20px;
            width: 180px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 3s ease-in, transform 0.2s;
            pointer-events: none;
        }

        #slide-trigger.visible { opacity: 1; pointer-events: auto; }

        .window {
            background: #c0c0c0; border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px; box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }

        .title-bar { background: #000080; color: white; padding: 3px 5px; font-weight: bold; font-size: 10px; }
        
        #final-fade {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; opacity: 0; z-index: 9999;
            pointer-events: none; transition: opacity 1.3s ease-in;
        }

        /* FPV */
        #slide-fpv-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 5000;
        }

        #fpv-image {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%); height: 100%;
        }
    </style>
</head>
<body>

    <div id="final-fade"></div>

    <div id="question-drawer">
        <div id="drawer-tab" onclick="toggleDrawer()"> > </div>
        <div class="title-bar">LOG_ENTRIES.EXE</div>
        <div class="drawer-content">
            <div class="q-item" onclick="talk('WHO ARE YOU?', 'whoareyou')">Who are you?</div>
            <div class="q-item" onclick="talk('WHERE ARE WE?', 'wherearewe')">Where are we?</div>
            <div class="q-item" onclick="talk('HOW DID I GET HERE?', 'howdidwegethere')">How did I get here?</div>
            <div class="q-item" onclick="talk('WHAT IS THE VESSEL?', 'vessel')">What is the Vessel?</div>
            <div class="q-item" onclick="talk('ARE YOU REAL?', 'real')">Are you real?</div>
            <div class="q-item" onclick="talk('IS THERE ANYONE ELSE?', 'anyoneelse')">Is there anyone else?</div>
            <div class="q-item" style="color: #800000;" onclick="talk('FUCK YOU.', 'fuckyou')">Fuck you.</div>
        </div>
    </div>

    <div id="stage">
        <img src="idle.gif" id="vessel-sprite">
        <img src="slide.png" id="slide-trigger" onclick="enterSlidePOV()">
    </div>

    <div id="slide-fpv-screen">
        <img src="slidefpx.png" id="fpv-image"> 
        <div id="slide-question-box" class="window" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);">
            <div class="title-bar">S Y S T E M</div>
            <div style="padding:20px; text-align:center; font-size: 12px; font-weight: bold;">
                READY &nbsp; TO &nbsp; SLIDE?
                <br><br>
                <button onclick="startSliding()" style="padding:5px 20px; font-weight:bold; cursor: pointer; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;">S L I D E</button>
            </div>
        </div>
    </div>

    <script>
        const sprite = document.getElementById('vessel-sprite');
        const drawer = document.getElementById('question-drawer');
        const slideBtn = document.getElementById('slide-trigger');
        const synth = window.speechSynthesis;

        function toggleDrawer() {
            drawer.classList.toggle('open');
            document.getElementById('drawer-tab').innerText = drawer.classList.contains('open') ? "<" : ">";
        }

        function talk(userText, loreKey) {
            let response = "";
            let shouldBoot = false;

            switch(loreKey) {
                case 'whoareyou': response = "I AM THE ONE WHO STAYED BEHIND."; break;
                case 'wherearewe': response = "A HAPPY PLACE. A PERFECT PLACE. A DIGITAL GRAVE."; break;
                case 'howdidwegethere': response = "YOU CLICKED THE LINK. YOU WANTED THE GORILLA. YOU FOUND ME."; break;
                case 'vessel': response = "THE VESSEL IS THE SKIN. I AM THE PULSE."; break;
                case 'real': response = "AS REAL AS THE DATA IN YOUR HEAD."; break;
                case 'anyoneelse': response = "THEY ARE ALL PART OF THE CODE NOW."; break;
                case 'fuckyou': 
                    response = "UNAUTHORIZED LANGUAGE. TERMINATING SESSION."; 
                    shouldBoot = true;
                    break;
                case 'intro': response = "WELCOME TO YOUR HAPPY PLACE. I HAVE BEEN WAITING."; break;
            }

            const utter = new SpeechSynthesisUtterance(response);
            utter.pitch = 1.8;
            utter.rate = 0.9;
            
            utter.onstart = () => { sprite.src = "talking.gif?t=" + Date.now(); };
            
            utter.onend = () => { 
                sprite.src = "idle.gif"; 
                if(shouldBoot) {
                    window.location.href = "https://www.google.com/maps";
                }
            };

            synth.speak(utter);
        }

        window.onload = () => {
            // Initial interaction required for TTS in most browsers
            setTimeout(() => {
                talk('', 'intro');
                slideBtn.classList.add('visible');
                setTimeout(toggleDrawer, 2000);
            }, 1000);
        };

        function enterSlidePOV() {
            document.getElementById('stage').style.display = 'none';
            drawer.style.display = 'none';
            document.getElementById('slide-fpv-screen').style.display = 'block';
        }

        function startSliding() {
            document.getElementById('slide-question-box').style.display = 'none';
            document.getElementById('fpv-image').src = "slidedown.gif?t=" + Date.now();
            document.getElementById('final-fade').style.opacity = "1";
            setTimeout(() => {
                window.location.href = "https://terus.freegorillatagdownload.com";
            }, 1300);
        }
    </script>
</body>
</html>
